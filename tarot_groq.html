<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神秘塔罗 · 命运之眼</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dark: #8a6d2f;
    --deep: #0d0a1a;
    --purple: #1a0f2e;
    --purple-mid: #2d1b4e;
    --card-bg: #16102a;
    --text: #f0e6c8;
    --text-dim: #a08060;
    --glow: rgba(201,168,76,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(74,45,122,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(42,15,60,0.4) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23c9a84c' fill-opacity='0.04'%3E%3Cpath d='M30 0l2 8-8-2 6 6-6 6 8-2-2 8 2-8 8 2-6-6 6-6-8 2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d) ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:0.1;transform:scale(1)} 50%{opacity:0.8;transform:scale(1.3)} }

  .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 20px 80px; }

  header { text-align: center; margin-bottom: 50px; }
  .eye-symbol { width: 60px; height: 40px; margin: 0 auto 20px; }
  .eye-symbol svg { width: 100%; height: 100%; }
  h1 { font-family: 'Cinzel', serif; font-size: clamp(28px,5vw,48px); color: var(--gold); letter-spacing: 4px; text-shadow: 0 0 30px var(--glow); margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: var(--text-dim); letter-spacing: 6px; font-weight: 300; }
  .divider { display: flex; align-items: center; gap: 16px; margin: 24px auto; max-width: 300px; }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg,transparent,var(--gold-dark),transparent); }
  .divider-gem { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }

  /* API Key */
  .apikey-section { margin-bottom: 30px; background: rgba(255,255,255,0.03); border: 1px solid rgba(201,168,76,0.15); border-radius: 12px; padding: 20px; }
  .apikey-label { color: var(--gold-light); font-size: 13px; letter-spacing: 1px; display: block; margin-bottom: 6px; }
  .apikey-hint { color: var(--text-dim); font-size: 11px; margin-bottom: 12px; line-height: 1.6; }
  .apikey-hint a { color: var(--gold); text-decoration: none; }
  .apikey-row { display: flex; gap: 10px; }
  input[type="password"], input[type="text"] {
    flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--gold-dark);
    border-radius: 8px; color: var(--text); font-family: 'Noto Serif SC', serif;
    font-size: 13px; padding: 10px 14px; outline: none; transition: border-color 0.3s;
  }
  input:focus { border-color: var(--gold); }
  .save-key-btn { padding: 10px 18px; background: rgba(201,168,76,0.2); border: 1px solid var(--gold-dark); border-radius: 8px; color: var(--gold-light); font-size: 13px; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
  .save-key-btn:hover { background: rgba(201,168,76,0.35); border-color: var(--gold); }
  .key-status { font-size: 11px; margin-top: 8px; color: var(--text-dim); }

  /* Model selector */
  .model-section { margin-bottom: 30px; }
  .model-label { color: var(--gold-light); font-size: 13px; letter-spacing: 1px; display: block; margin-bottom: 10px; }
  .model-options { display: flex; gap: 10px; flex-wrap: wrap; }
  .model-btn { padding: 8px 16px; background: transparent; border: 1px solid var(--gold-dark); border-radius: 20px; color: var(--text-dim); font-family: 'Noto Serif SC', serif; font-size: 12px; cursor: pointer; transition: all 0.3s; }
  .model-btn:hover, .model-btn.active { background: rgba(201,168,76,0.15); border-color: var(--gold); color: var(--gold-light); }

  /* Question */
  .question-section { margin-bottom: 30px; }
  .question-label { display: block; text-align: center; color: var(--gold-light); font-size: 15px; letter-spacing: 2px; margin-bottom: 16px; }
  textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--gold-dark); border-radius: 12px; color: var(--text); font-family: 'Noto Serif SC', serif; font-size: 15px; padding: 16px 20px; resize: none; outline: none; min-height: 90px; transition: border-color 0.3s, box-shadow 0.3s; }
  textarea:focus { border-color: var(--gold); box-shadow: 0 0 20px rgba(201,168,76,0.15); }
  textarea::placeholder { color: var(--text-dim); }

  /* Spread */
  .spread-section { margin-bottom: 40px; text-align: center; }
  .spread-label { color: var(--gold-light); font-size: 14px; letter-spacing: 2px; margin-bottom: 16px; display: block; }
  .spread-options { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
  .spread-btn { padding: 10px 20px; background: transparent; border: 1px solid var(--gold-dark); border-radius: 30px; color: var(--text-dim); font-family: 'Noto Serif SC', serif; font-size: 13px; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; }
  .spread-btn:hover, .spread-btn.active { background: rgba(201,168,76,0.15); border-color: var(--gold); color: var(--gold-light); box-shadow: 0 0 12px rgba(201,168,76,0.2); }

  /* Draw button */
  .draw-btn { display: block; margin: 0 auto 50px; padding: 16px 48px; background: linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-dark)); background-size: 200% 100%; border: none; border-radius: 40px; color: var(--deep); font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600; letter-spacing: 3px; cursor: pointer; transition: all 0.4s; box-shadow: 0 4px 20px rgba(201,168,76,0.3); animation: shimmer 3s ease-in-out infinite; }
  @keyframes shimmer { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
  .draw-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.5); }
  .draw-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Cards */
  .cards-area { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 50px; min-height: 200px; }
  .tarot-card { width: 110px; flex-shrink: 0; animation: cardReveal 0.6s ease forwards; opacity: 0; }
  @keyframes cardReveal { from{opacity:0;transform:translateY(30px) rotateY(90deg)} to{opacity:1;transform:translateY(0) rotateY(0deg)} }
  .card-inner { background: var(--card-bg); border: 1px solid var(--gold-dark); border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.2); }
  .card-art { width: 100%; aspect-ratio: 2/3; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .card-art-bg { position: absolute; inset: 0; background: radial-gradient(circle at 50% 40%,var(--purple-mid),var(--card-bg)); }
  .card-art-border { position: absolute; inset: 8px; border: 1px solid rgba(201,168,76,0.3); border-radius: 6px; }
  .card-art-symbol { position: relative; z-index: 1; font-size: 40px; filter: drop-shadow(0 0 10px var(--glow)); }
  .card-reversed-badge { position: absolute; top: 6px; right: 6px; background: rgba(180,60,60,0.6); color: #ffaaaa; font-size: 9px; padding: 2px 5px; border-radius: 3px; z-index: 2; letter-spacing: 1px; }
  .card-footer { padding: 8px 6px; text-align: center; }
  .card-position { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 4px; }
  .card-name { font-size: 11px; color: var(--gold-light); font-weight: 500; line-height: 1.3; }

  /* Reading */
  .reading-section { background: rgba(255,255,255,0.03); border: 1px solid rgba(201,168,76,0.2); border-radius: 16px; padding: 32px; position: relative; overflow: hidden; display: none; }
  .reading-section.visible { display: block; animation: fadeIn 0.8s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .reading-section::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
  .reading-title { font-family:'Cinzel',serif; color:var(--gold); font-size:18px; letter-spacing:3px; margin-bottom:24px; text-align:center; }
  .reading-text { font-size:15px; line-height:2; color:var(--text); white-space:pre-wrap; }
  .loading-dots { text-align:center; padding:20px; color:var(--gold); font-size:24px; letter-spacing:6px; animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  .error-msg { background:rgba(180,60,60,0.15); border:1px solid rgba(180,60,60,0.4); border-radius:8px; padding:12px 16px; color:#ff9999; font-size:13px; margin-top:12px; text-align:center; display:none; }

  footer-note { display:block; text-align:center; color:var(--text-dim); font-size:11px; margin-top:40px; letter-spacing:1px; opacity:0.6; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <header>
    <div class="eye-symbol">
      <svg viewBox="0 0 60 40" fill="none">
        <path d="M30 2 C10 2 2 20 2 20 C2 20 10 38 30 38 C50 38 58 20 58 20 C58 20 50 2 30 2Z" stroke="#c9a84c" stroke-width="1.5" fill="none"/>
        <circle cx="30" cy="20" r="10" stroke="#c9a84c" stroke-width="1.5" fill="rgba(201,168,76,0.1)"/>
        <circle cx="30" cy="20" r="5" fill="#c9a84c"/>
        <circle cx="28" cy="18" r="1.5" fill="white" opacity="0.8"/>
        <line x1="30" y1="2" x2="30" y2="8" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
        <line x1="30" y1="32" x2="30" y2="38" stroke="#c9a84c" stroke-width="1" opacity="0.5"/>
      </svg>
    </div>
    <h1>命运之眼</h1>
    <p class="subtitle">TAROT · ORACLE · DESTINY</p>
    <div class="divider"><div class="divider-line"></div><div class="divider-gem"></div><div class="divider-line"></div></div>
    <p style="color:var(--text-dim);font-size:13px;letter-spacing:1px;">星辰指引 · 塔罗解读 · Powered by Llama</p>
  </header>

  <!-- API Key -->
  <div class="apikey-section">
    <label class="apikey-label">✦ Groq API Key（免费）</label>
    <p class="apikey-hint">
      1. 访问 <a href="https://console.groq.com" target="_blank">console.groq.com</a> 注册账号（完全免费）<br>
      2. 进入 "API Keys" 页面 → 点击 "Create API Key"<br>
      3. 复制 Key 粘贴到下方
    </p>
    <div class="apikey-row">
      <input type="password" id="apikey" placeholder="gsk_xxxxxxxxxxxxxxxxxxxxxxxx" />
      <button class="save-key-btn" onclick="saveKey()">保存</button>
    </div>
    <div class="key-status" id="key-status"></div>
  </div>

  <!-- Model selector -->
  <div class="model-section">
    <label class="model-label">✦ 选择 Llama 模型</label>
    <div class="model-options">
      <button class="model-btn active" data-model="llama-3.3-70b-versatile">Llama 3.3 70B（推荐）</button>
      <button class="model-btn" data-model="llama-3.1-8b-instant">Llama 3.1 8B（更快）</button>
      <button class="model-btn" data-model="llama3-70b-8192">Llama 3 70B</button>
    </div>
  </div>

  <!-- Question -->
  <div class="question-section">
    <label class="question-label">✦ 将你的困惑或问题倾诉给星辰</label>
    <textarea id="question" placeholder="例如：我的事业发展方向应该如何选择？&#10;我与他/她的感情是否有缘分？&#10;近期我的运势如何？" rows="3"></textarea>
  </div>

  <!-- Spread -->
  <div class="spread-section">
    <label class="spread-label">✦ 选择牌阵</label>
    <div class="spread-options">
      <button class="spread-btn active" data-spread="single">单张牌 · 当下指引</button>
      <button class="spread-btn" data-spread="three">三张牌 · 过去现在未来</button>
      <button class="spread-btn" data-spread="celtic">五张牌 · 凯尔特十字</button>
    </div>
  </div>

  <button class="draw-btn" id="drawBtn" onclick="drawCards()">✦ 抽取塔罗牌 ✦</button>

  <div class="cards-area" id="cardsArea"></div>
  <div class="error-msg" id="errorMsg"></div>

  <div class="reading-section" id="readingSection">
    <div class="reading-title">✦ 星辰之语 ✦</div>
    <div class="reading-text" id="readingText"></div>
  </div>

  <footer-note>塔罗仅供娱乐参考，命运掌握在自己手中 · 愿星光照耀你的前路</footer-note>
</div>

<script>
// 星星
const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
  starsEl.appendChild(s);
}

// 牌阵选择
let currentSpread = 'single';
document.querySelectorAll('.spread-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.spread-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSpread = btn.dataset.spread;
  });
});

// 模型选择
let currentModel = 'llama-3.3-70b-versatile';
document.querySelectorAll('.model-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentModel = btn.dataset.model;
  });
});

// API Key
function saveKey() {
  const key = document.getElementById('apikey').value.trim();
  if (key) {
    sessionStorage.setItem('groq_key', key);
    document.getElementById('key-status').textContent = '✓ 已保存（本次会话有效）';
    document.getElementById('key-status').style.color = '#8bc34a';
  }
}
const saved = sessionStorage.getItem('groq_key');
if (saved) {
  document.getElementById('apikey').value = saved;
  document.getElementById('key-status').textContent = '✓ 已加载保存的密钥';
  document.getElementById('key-status').style.color = '#8bc34a';
}

// 塔罗牌数据
const MAJOR_ARCANA = [
  {name:'愚者',symbol:'🌟',energy:'新的开始、冒险、自由'},
  {name:'魔术师',symbol:'🪄',energy:'意志、技能、创造力'},
  {name:'女祭司',symbol:'🌙',energy:'直觉、神秘、内在智慧'},
  {name:'女皇',symbol:'🌺',energy:'丰盛、创造、母性'},
  {name:'皇帝',symbol:'⚔️',energy:'权威、稳定、领导力'},
  {name:'教皇',symbol:'✝️',energy:'传统、精神指引、规则'},
  {name:'恋人',symbol:'💫',energy:'爱情、选择、灵魂伴侣'},
  {name:'战车',symbol:'🏆',energy:'意志力、胜利、控制'},
  {name:'力量',symbol:'🦁',energy:'内在力量、勇气、耐心'},
  {name:'隐者',symbol:'🔦',energy:'内省、独处、智慧探索'},
  {name:'命运之轮',symbol:'☸️',energy:'变化、命运、转折点'},
  {name:'正义',symbol:'⚖️',energy:'公正、平衡、因果'},
  {name:'倒吊人',symbol:'🔮',energy:'暂停、牺牲、新视角'},
  {name:'死神',symbol:'🌑',energy:'结束、转变、重生'},
  {name:'节制',symbol:'🌈',energy:'平衡、耐心、目的'},
  {name:'恶魔',symbol:'🔗',energy:'束缚、物质、阴影自我'},
  {name:'塔',symbol:'⚡',energy:'突变、觉醒、解放'},
  {name:'星星',symbol:'⭐',energy:'希望、灵感、指引'},
  {name:'月亮',symbol:'🌕',energy:'幻觉、恐惧、潜意识'},
  {name:'太阳',symbol:'☀️',energy:'成功、活力、光明'},
  {name:'审判',symbol:'🎺',energy:'觉醒、更新、回应召唤'},
  {name:'世界',symbol:'🌍',energy:'完成、成就、整合'},
];

const SPREADS = {
  single: ['当下指引'],
  three: ['过去','现在','未来'],
  celtic: ['现状','挑战','过去基础','可能未来','建议']
};

function drawRandomCards(count) {
  const shuffled = [...MAJOR_ARCANA].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count).map(card => ({...card, reversed: Math.random() < 0.3}));
}

async function drawCards() {
  const apiKey = document.getElementById('apikey').value.trim() || sessionStorage.getItem('groq_key');
  if (!apiKey) { showError('请先输入 Groq API Key'); return; }
  const question = document.getElementById('question').value.trim();
  if (!question) { showError('请先输入你的问题或困惑'); return; }

  const btn = document.getElementById('drawBtn');
  btn.disabled = true;
  btn.textContent = '✦ 星辰正在感应... ✦';
  hideError();

  const positions = SPREADS[currentSpread];
  const drawnCards = drawRandomCards(positions.length);

  // 显示卡牌
  const cardsArea = document.getElementById('cardsArea');
  cardsArea.innerHTML = '';
  drawnCards.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'tarot-card';
    div.style.animationDelay = `${i * 0.2}s`;
    div.innerHTML = `
      <div class="card-inner" style="${card.reversed ? 'filter:hue-rotate(30deg)' : ''}">
        <div class="card-art" style="${card.reversed ? 'transform:rotate(180deg)' : ''}">
          <div class="card-art-bg"></div>
          <div class="card-art-border"></div>
          ${card.reversed ? '<div class="card-reversed-badge">逆位</div>' : ''}
          <span class="card-art-symbol">${card.symbol}</span>
        </div>
        <div class="card-footer">
          <div class="card-position">${positions[i]}</div>
          <div class="card-name">${card.name}${card.reversed ? '（逆）' : ''}</div>
        </div>
      </div>`;
    cardsArea.appendChild(div);
  });

  const cardDesc = drawnCards.map((c, i) =>
    `【${positions[i]}】${c.name}${c.reversed ? '（逆位）' : '（正位）'} - 能量：${c.energy}`
  ).join('\n');

  const prompt = `你是一位深邃神秘的塔罗占卜师，融合东方玄学与西方塔罗智慧，语言优美诗意。

用户问题：${question}

抽到的牌阵（${currentSpread === 'single' ? '单张' : currentSpread === 'three' ? '过去现在未来三张' : '凯尔特五张'}）：
${cardDesc}

请用中文进行详细解读，要求：
1. 先简述整体牌阵传达的核心信息（2-3句）
2. 逐一解读每张牌在其位置上的含义与指引
3. 结合用户问题给出综合建议（实际可操作的方向）
4. 用一句诗意的话作为结尾

语气神秘而温暖，充满智慧，字数在400-600字之间。只用中文回答。`;

  const readingSection = document.getElementById('readingSection');
  const readingText = document.getElementById('readingText');
  readingSection.classList.add('visible');
  readingText.innerHTML = '<div class="loading-dots">· · ·</div>';

  try {
    // ✅ 这里用的是 Groq API
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: currentModel,
        max_tokens: 1024,
        messages: [
          { role: 'system', content: '你是一位专业的塔罗占卜师，只用中文回答。' },
          { role: 'user', content: prompt }
        ]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const text = data.choices[0].message.content;
    readingText.textContent = text;

  } catch (e) {
    readingText.innerHTML = '';
    readingSection.classList.remove('visible');
    showError('解读失败：' + e.message + '。请检查 API Key 是否正确。');
  }

  btn.disabled = false;
  btn.textContent = '✦ 重新抽牌 ✦';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}
</script>
</body>
</html>
